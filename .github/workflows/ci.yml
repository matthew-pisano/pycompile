name: Continuous Integration Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CMAKE_PARALLEL: true

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Run Clang Format
        uses: actions/checkout@v4
        with:
          repository: 'Sarcasm/run-clang-format'
          path: 'run-clang-format'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format build-essential
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update
          sudo apt-get install -y python3.14 python3.14-venv

      - name: Run Clang Format
        run: |
          sed -i '/InsertNewlineAtEOF: true/d' .clang-format
          ./run-clang-format/run-clang-format.py -r src include test

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
          sudo apt install software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update
          sudo apt-get install -y python3.14 python3.14-venv python3.14-dev
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt update
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 14
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 14
          gcc --version
          sudo apt install -y llvm-20 libmlir-20-dev mlir-20-tools llvm-20-dev llvm-20-tools
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH
          echo "/usr/lib/llvm-20/lib/cmake/mlir" >> $GITHUB_PATH
          echo "/usr/lib/llvm-20/lib/cmake/llvm" >> $GITHUB_PATH
          mkdir logs

      - name: Configure CMake
        run: >-
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DPython_EXECUTABLE=/usr/bin/python3.14
          -DMLIR_DIR=/usr/lib/llvm-20/lib/cmake/mlir
          -DLLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm

      - name: Build project
        run: |
          [[ "${CMAKE_PARALLEL}" == true ]] && \
          cmake --build build --parallel || \
          cmake --build build

      - name: Run CTests
        run: |
          cd build
          ctest --output-on-failure --verbose --output-junit ../logs/ctest-results.xml
          cd -

      - name: Publish test results
        uses: dorny/test-reporter@v2.1.1
        if: always()
        with:
          name: Catch2 Tests
          path: logs/*.xml
          reporter: java-junit
          fail-on-error: true